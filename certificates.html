<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ink Magic Mantra - Certificates</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    font-family:Arial, sans-serif;
    color:white;
}

header{
    text-align:center;
    padding:40px 20px;
    border-bottom:2px solid #d4af37;
}

header h1{
    color:#d4af37;
    font-size:3rem;
}

.certificates{
    max-width:1400px;
    margin:50px auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
    gap:30px;
}

.certificate-card{
    background:#111;
    border:2px solid #d4af37;
    border-radius:12px;
    overflow:hidden;
    transition:.3s;
}

.certificate-card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(212,175,55,.4);
}

.certificate-card img{
    width:100%;
    height:400px;
    object-fit:cover;
}

.certificate-card figcaption{
    padding:15px;
    text-align:center;
    color:#d4af37;
    font-size:18px;
    font-weight:bold;
}

.home-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #d4af37;
    color: #000;
    text-decoration: none;
    padding: 12px 20px;
    font-weight: bold;
    border: 2px solid #d4af37;
    border-radius: 5px;
    z-index: 1000;
    transition: 0.3s;
}

.home-btn:hover {
    background: transparent;
    color: #d4af37;
}
/* openable image */
.certificate-card img{
    width:100%;
    height:250px;
    object-fit:contain;
    background:#111;
    padding:10px;
    cursor:pointer;
    transition:0.3s;
}
.certificate-card img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:contain;
    background:#111;
    padding:10px;
}
.certificate-card img:hover{
    transform:scale(1.03);
}

/* Popup Modal */
#imgModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#imgModal img{
    max-width:90%;
    max-height:90%;
    border:3px solid #d4af37;
}

.close{
    position:absolute;
    top:20px;
    right:40px;
    color:#d4af37;
    font-size:45px;
    cursor:pointer;
}

</style>
</head>
<body>
<!-- Certificate Image Popup -->
<div id="imgModal">
    <span class="close" onclick="closeImg()">&times;</span>
    <img id="modalImg">
</div>
<header>
    <h1>🏆 Our Certificates</h1>

    <a href="index.html" class="home-btn">
        ← Back to Home
    </a>
</header>

<section class="certificates">

    <figure class="certificate-card">
        <img src="image/cer1.PNG" alt="Certificate 1">
        <figcaption>Professional Tattoo Artist Certification</figcaption>
    </figure>

    <figure class="certificate-card">
        <img src="image/cer2.PNG" alt="Certificate 2">
        <figcaption>Advanced Tattoo Design Workshop</figcaption>
    </figure>

    <figure class="certificate-card">
        <img src="image/cer3.PNG" alt="Certificate 3">
        <figcaption>Hygiene & Safety Certification</figcaption>
    </figure>

    <figure class="certificate-card">
        <img src="image/cer4.PNG" alt="Certificate 4">
        <figcaption>International Tattoo Training Program</figcaption>
    </figure>

</section>

</body>
<script>
const certImages = document.querySelectorAll(".certificate-card img");
const modal = document.getElementById("imgModal");
const modalImg = document.getElementById("modalImg");

certImages.forEach(img => {
    img.addEventListener("click", function() {
        modal.style.display = "flex";
        modalImg.src = this.src;
    });
});

function closeImg() {
    modal.style.display = "none";
}

// Close when clicking outside image
modal.addEventListener("click", function(e) {
    if (e.target === modal) {
        modal.style.display = "none";
    }
});
</script>
</html>
