<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ink Magic Mantra - Awards</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    font-family:Arial, sans-serif;
    color:white;
}

/* Header */
header{
    text-align:center;
    padding:40px 20px;
    border-bottom:2px solid #d4af37;
}

header h1{
    color:#d4af37;
    font-size:3rem;
}

/* Home Button */
.home-btn{
    position:fixed;
    top:20px;
    left:20px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    padding:12px 20px;
    font-weight:bold;
    border:2px solid #d4af37;
    border-radius:5px;
    z-index:1000;
    transition:.3s;
}

.home-btn:hover{
    background:transparent;
    color:#d4af37;
}

/* Awards Grid */
.awards{
    max-width:1200px;
    margin:50px auto;
    padding:20px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
}

/* Award Card */
.award-card{
    background:#111;
    border:2px solid #d4af37;
    border-radius:12px;
    overflow:hidden;
    transition:.3s;
}

.award-card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(212,175,55,.4);
}

/* Portrait Image */
.award-card img{
    width:100%;
    height:500px;
    object-fit:contain;
    background:#111;
    padding:10px;
    cursor:pointer;
    transition:.3s;
}

.award-card img:hover{
    transform:scale(1.03);
}

/* Caption */
.award-card figcaption{
    padding:15px;
    text-align:center;
    color:#d4af37;
    font-size:18px;
    font-weight:bold;
}

/* Popup */
#imgModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#imgModal img{
    max-width:90%;
    max-height:90%;
    border:3px solid #d4af37;
}

.close{
    position:absolute;
    top:20px;
    right:40px;
    color:#d4af37;
    font-size:45px;
    cursor:pointer;
}

/* Mobile */
@media(max-width:768px){

    header h1{
        font-size:2rem;
    }

    .award-card img{
        height:400px;
    }

    .home-btn{
        padding:10px 15px;
        font-size:14px;
    }
}

</style>
</head>

<body>

<!-- Image Popup -->
<div id="imgModal">
    <span class="close" onclick="closeImg()">&times;</span>
    <img id="modalImg">
</div>

<header>

    <h1>🏆 Our Awards</h1>

    <a href="index.html" class="home-btn">
        ← Back to Home
    </a>

</header>

<section class="awards">

    <!-- <figure class="award-card">
        <img src="image/award1.png" alt="Award 1">
        <figcaption>Best Tattoo Artist Award</figcaption>
    </figure>

    <figure class="award-card">
        <img src="image/award2.png" alt="Award 2">
        <figcaption>Creative Excellence Award</figcaption>
    </figure> -->

    <figure class="award-card">
        <img src="image/award3.PNG" alt="Award 3">
        <figcaption>Customer Choice Award</figcaption>
    </figure>

    <figure class="award-card">
        <img src="image/award4.PNG" alt="Award 4">
        <figcaption>Professional Achievement Award</figcaption>
    </figure>
     <figure class="award-card">
        <img src="image/award5.PNG" alt="Award 5">
        <figcaption>Professional Achievement Award</figcaption>
    </figure>
     <figure class="award-card">
        <img src="image/award6.jpeg" alt="Award 6">
        <figcaption>Professional Achievement Award</figcaption>
    </figure>
    </figure>
     <figure class="award-card">
        <img src="image/award7.jpeg" alt="Award 7">
        <figcaption>Professional Achievement Award</figcaption>
    </figure>
</section>

<script>

const awardImages = document.querySelectorAll(".award-card img");
const modal = document.getElementById("imgModal");
const modalImg = document.getElementById("modalImg");

awardImages.forEach(img => {

    img.addEventListener("click", function(){

        modal.style.display = "flex";
        modalImg.src = this.src;

    });

});

function closeImg(){

    modal.style.display = "none";

}

modal.addEventListener("click", function(e){

    if(e.target === modal){

        modal.style.display = "none";

    }

});

</script>

</body>
</html>
